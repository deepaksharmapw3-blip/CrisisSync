version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: crisissync_db
    environment:
      POSTGRES_USER: crisissync
      POSTGRES_PASSWORD: crisissync
      POSTGRES_DB: crisissync
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crisissync"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crisissync_net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crisissync_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - crisissync_net

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crisissync_api
    environment:
      DATABASE_URL: postgresql+asyncpg://crisissync:crisissync@db:5432/crisissync
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
      APP_ENV: production
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - crisissync_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker (background AI tasks) ───────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crisissync_worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://crisissync:crisissync@db:5432/crisissync
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - crisissync_net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: crisissync_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - crisissync_net

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../crisissync-app
      dockerfile: ../crisissync-backend/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    container_name: crisissync_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - crisissync_net

volumes:
  postgres_data:
  redis_data:

networks:
  crisissync_net:
    driver: bridge
