[build]
  base = "crisissync-app"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production.environment]
  NEXT_PUBLIC_API_URL = "https://crisissync-api-production-6426.up.railway.app/api/v1"
  NEXT_PUBLIC_WS_URL = "wss://crisissync-api-production-6426.up.railway.app/ws"
