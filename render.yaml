services:
  # ── FastAPI Backend ───────────────────────────────────────────────────────
  - type: web
    name: crisissync-api
    env: docker
    region: oregon
    plan: free
    dockerContext: ./crisissync-backend
    dockerfilePath: ./crisissync-backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crisissync-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: crisissync-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        value: "SET_ME_IN_DASHBOARD"
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: '["https://your-netlify-app-url.netlify.app"]'

  # ── Redis (Free Tier) ─────────────────────────────────────────────────────
  - type: redis
    name: crisissync-redis
    region: oregon
    plan: free

# ── Database (Free Tier) ────────────────────────────────────────────────────
databases:
  - name: crisissync-db
    databaseName: crisissync
    user: crisissync
    region: oregon
    plan: free
