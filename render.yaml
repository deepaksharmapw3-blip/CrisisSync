services:
  # ── FastAPI Backend ───────────────────────────────────────────────────────
  - type: web
    name: crisissync-api
    env: docker
    dockerContext: ./crisissync-backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crisissync-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: crisissync-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
        value: "" # Set manually in dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: '["https://your-netlify-app-url.netlify.app"]'

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: crisissync-redis
    ipAllowList: [] # Internal only

# ── Database ──────────────────────────────────────────────────────────────────
databases:
  - name: crisissync-db
    databaseName: crisissync
    user: crisissync
    plan: free
