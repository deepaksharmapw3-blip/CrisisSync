[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  PNPM_FLAGS = "--no-frozen-lockfile"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production.environment]
  NEXT_PUBLIC_API_URL = "https://crisissync-api-production.up.railway.app/api/v1"
  NEXT_PUBLIC_WS_URL = "wss://crisissync-api-production.up.railway.app/ws"
